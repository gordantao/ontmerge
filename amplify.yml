version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'no-cache'
    - pattern: 'assets/**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
  redirects:
    - source: '/<*>'
      target: '/index.html'
      status: '404-200'
